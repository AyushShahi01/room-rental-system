
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2060' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
  },
});

const diagram = `erDiagram
  USERS {
    int userID PK
    string name
    string email
    string passwordHash
    enum role
    string phone
    timestamp createdAt
  }
  ROOMS {
    int roomID PK
    int landlordID FK
    string description
    string location
    decimal rentPrice
    boolean isAvailable
    string photos
    string amenities
    timestamp createdAt
  }
  BOOKINGS {
    int bookingID PK
    int roomID FK
    int tenantID FK
    date startDate
    date endDate
    enum status
    timestamp createdAt
  }
  PAYMENTS {
    int paymentID PK
    int bookingID FK
    decimal amount
    date paymentDate
    string method
    enum status
    string transactionRef
  }
  MAINTENANCE_REQUESTS {
    int requestID PK
    int roomID FK
    int tenantID FK
    string description
    string photos
    enum status
    date dateReported
    date dateResolved
  }
  AGREEMENTS {
    int agreementID PK
    int bookingID FK
    text agreementText
    date signedDate
    boolean landlordSigned
    boolean tenantSigned
  }
  MESSAGES {
    int messageID PK
    int senderID FK
    int receiverID FK
    int bookingID FK
    text content
    timestamp sentAt
    boolean isRead
  }
  NOTIFICATIONS {
    int notificationID PK
    int userID FK
    string type
    string content
    boolean isRead
    timestamp createdAt
  }

  USERS ||--o{ ROOMS : "owns (landlord)"
  USERS ||--o{ BOOKINGS : "makes (tenant)"
  ROOMS ||--o{ BOOKINGS : "booked via"
  BOOKINGS ||--o{ PAYMENTS : "has"
  BOOKINGS ||--|| AGREEMENTS : "has one"
  ROOMS ||--o{ MAINTENANCE_REQUESTS : "reported for"
  USERS ||--o{ MAINTENANCE_REQUESTS : "submitted by"
  USERS ||--o{ MESSAGES : "sends"
  USERS ||--o{ MESSAGES : "receives"
  BOOKINGS ||--o{ MESSAGES : "related to"
  USERS ||--o{ NOTIFICATIONS : "receives"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
